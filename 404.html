<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Page Not Found</title>

<style>

body{
font-family:Arial,sans-serif;
background:#eef3f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{

background:white;

padding:50px;

border-radius:20px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,.1);

}

h1{

font-size:90px;

color:#002147;

margin:0;

}

p{

font-size:20px;

margin:20px 0;

}

a{

display:inline-block;

padding:12px 25px;

background:#002147;

color:white;

text-decoration:none;

border-radius:8px;

}

a:hover{

background:#004b8d;

}

</style>

</head>

<body>

<div class="box">

<h1>404</h1>

<p>The page you are looking for could not be found.</p>

<a href="index.html">Return to Home</a>

</div>

</body>

</html>
